apiVersion: v1
kind: ConfigMap
metadata:
  name: workshop-web-config
  namespace: workshop
  labels:
    app: workshop-web
data:
  # Key-value สำหรับ inject เป็น environment variable
  APP_ENV: "production"
  APP_COLOR: "blue"
  APP_VERSION: "1.0.0"

  # Key สำหรับ mount เป็น file (nginx custom page)
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Workshop App</title></head>
    <body>
      <h1>Hello from Kubernetes Workshop!</h1>
      <p>This page is served from a ConfigMap-mounted file.</p>
    </body>
    </html>
