apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-hpa-app
  namespace: workshop
  labels:
    app: workshop-hpa-app
spec:
  replicas: 1                       # เริ่มต้นที่ 1 replica แล้วให้ HPA scale
  selector:
    matchLabels:
      app: workshop-hpa-app
  template:
    metadata:
      labels:
        app: workshop-hpa-app
    spec:
      containers:
      - name: app
        image: python:3.11-alpine   # multi-arch รองรับทั้ง amd64 และ arm64
        ports:
        - name: http              # ชื่อ port (ไม่บังคับ แต่ช่วยให้อ่านง่าย)
          containerPort: 80
        # HTTP server ที่ burn CPU ต่อ request ด้วย sqrt loop
        command:
        - python3
        - -c
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import math
          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  x = sum(math.sqrt(i) for i in range(50000))
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'OK\n')
              def log_message(self, *a): pass  # ปิด access log
          HTTPServer(('', 80), Handler).serve_forever()
        resources:
          requests:
            cpu: 200m               # HPA ใช้ค่านี้คำนวณ % การใช้งาน
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi
