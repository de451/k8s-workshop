apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workshop-hpa
  namespace: workshop
  labels:
    app: workshop-hpa-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workshop-hpa-app          # ชี้ไปยัง Deployment ที่ต้องการ scale

  minReplicas: 1                    # จำนวน Pod ต่ำสุด
  maxReplicas: 5                    # จำนวน Pod สูงสุด

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50      # scale up ถ้า CPU เฉลี่ยเกิน 50%
