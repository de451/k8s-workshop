apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-web
  namespace: workshop
  labels:
    app: workshop-web
spec:
  replicas: 2                       # เริ่มต้นด้วย 2 replicas เพื่อสาธิต HA
  selector:
    matchLabels:
      app: workshop-web             # ต้องตรงกับ labels ของ Pod template
  template:
    metadata:
      labels:
        app: workshop-web           # Pod จะถูก tag ด้วย label นี้
    spec:
      containers:
      - name: web
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
